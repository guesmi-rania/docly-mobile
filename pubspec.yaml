name: docly
description: Application de réservation médicale

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2

  # UI & Animation
  lottie: ^3.1.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2

  # Navigation
  go_router: ^13.2.0

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  # HTTP & Storage
  dio: ^5.4.0
  shared_preferences: ^2.2.2

  # PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2

  # Paiement
  webview_flutter: ^4.4.2
  url_launcher: ^6.2.4

  # ← firebase_core et firebase_messaging SUPPRIMÉS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/